<!-- templates/error.html -->
{% extends "base.html" %}

{% block title %}{{ error or '错误' }} - 企业数据分析智能体{% endblock %}

{% block body %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <i class="bi bi-exclamation-triangle" style="font-size: 4rem; color: #f59e0b;"></i>
            <h3 class="mt-3">出错了</h3>
            <p class="text-muted">{{ error or '服务器遇到了一些问题，请稍后重试。' }}</p>
            <a href="{{ url_for('chat.chat_page') }}" class="btn btn-primary">
                <i class="bi bi-house"></i> 返回首页
            </a>
        </div>
    </div>
</div>
{% endblock %}
