<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 企业数据分析智能体</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 440px;
            width: 100%;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .captcha-group .input-group-text {
            padding: 0;
            border: none;
        }
        .captcha-group img {
            height: 38px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 可选的品牌图标和标题，如需去掉可自行删除 -->
        <div class="text-center mb-4">
            <i class="bi bi-robot" style="font-size: 3rem; color: #667eea;"></i>
            <h3 class="mt-2">DataAgent</h3>
            <p class="text-muted">企业数据分析智能体</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="off">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <div class="mb-3">
                <label class="form-label">验证码</label>
                <div class="input-group captcha-group">
                    <input type="text" class="form-control" name="captcha" placeholder="请输入验证码" maxlength="4" required>
                    <span class="input-group-text">
                        <img id="captcha-img" src="{{ url_for('auth.captcha') }}" alt="验证码" title="点击刷新验证码">
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">登 录</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('captcha-img').addEventListener('click', function() {
            this.src = '{{ url_for("auth.captcha") }}?t=' + new Date().getTime();
        });
    </script>
</body>
</html>
